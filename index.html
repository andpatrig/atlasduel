<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AtlasDuel — World Country Challenge</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230E1A2B'/%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='%23E3A73A' stroke-width='5'/%3E%3Cpolygon points='50,14 60,50 50,42 40,50' fill='%23E3A73A'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23E3A73A'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================= DESIGN TOKENS ============================= */
:root{
  --ink:#0B1622;
  --ocean:#0E2136;
  --ocean-deep:#081420;
  --land:#C9C0A6;
  --land-hover:#DED5B6;
  --land-stroke:#0B1622;
  --panel:rgba(13,25,39,0.86);
  --panel-soft:rgba(20,35,52,0.6);
  --panel-border:rgba(201,192,168,0.16);
  --gold:#E3A73A;
  --gold-soft:rgba(227,167,58,0.22);
  --emerald:#4FA277;
  --emerald-soft:rgba(79,162,119,0.22);
  --rust:#C2452E;
  --rust-soft:rgba(194,69,46,0.22);
  --paper:#F4EFE3;
  --muted:#9FB2C4;
  --muted-dim:#6C8091;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --radius:14px;
  --radius-sm:8px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--ink);}
body{
  font-family:var(--font-body);
  color:var(--paper);
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
button{font-family:var(--font-body);}
p{margin:0;}
ul{list-style:none;margin:0;padding:0;}
::selection{background:var(--gold-soft);}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}

.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;color:currentColor;}

/* ============================= APP SHELL ============================= */
#app{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;}
.screen.active{display:block;}

/* ============================= START SCREEN ============================= */
#screen-start{
  background:radial-gradient(circle at 30% 20%, #142a40 0%, var(--ink) 55%, var(--ocean-deep) 100%);
  overflow-y:auto;
}
#start-watermark{position:absolute;inset:0;opacity:0.07;pointer-events:none;}
#start-watermark path{fill:none;stroke:var(--paper);stroke-width:0.6;}

.start-inner{
  position:relative;
  max-width:760px;
  margin:0 auto;
  padding:min(7vh,64px) 24px 56px;
  display:flex;flex-direction:column;
  gap:36px;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand .compass-icon{width:40px;height:40px;color:var(--gold);animation:spin 40s linear infinite;}
.brand-text h1{font-size:clamp(32px,6vw,46px);letter-spacing:-0.01em;color:var(--paper);}
.brand-text p{font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

.setup-section{display:flex;flex-direction:column;gap:14px;}
.setup-label{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:baseline;gap:8px;}
.setup-label .step-num{color:var(--gold);}

.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media (max-width:640px){.mode-grid{grid-template-columns:1fr;}}
.mode-card{
  background:var(--panel-soft);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  padding:18px 16px;
  text-align:left;
  cursor:pointer;
  color:var(--paper);
  transition:border-color .18s ease, background .18s ease, transform .18s ease;
  display:flex;flex-direction:column;gap:10px;
}
.mode-card:hover{border-color:rgba(227,167,58,0.4);transform:translateY(-2px);}
.mode-card.selected{border-color:var(--gold);background:linear-gradient(160deg, rgba(227,167,58,0.14), var(--panel-soft));box-shadow:0 0 0 1px var(--gold) inset;}
.mode-card .icon{width:26px;height:26px;color:var(--gold);}
.mode-card h3{font-size:17px;}
.mode-card p{font-size:13px;color:var(--muted);line-height:1.45;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  background:var(--panel-soft);
  border:1px solid var(--panel-border);
  color:var(--paper);
  border-radius:999px;
  padding:9px 18px;
  font-size:13.5px;
  cursor:pointer;
  transition:border-color .16s ease, background .16s ease;
  font-family:var(--font-body);
}
.chip:hover{border-color:rgba(227,167,58,0.45);}
.chip.selected{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600;}

#players-panel{display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.player-row{display:flex;gap:8px;align-items:center;}
.player-row input{
  flex:1;
  background:var(--panel-soft);
  border:1px solid var(--panel-border);
  color:var(--paper);
  border-radius:var(--radius-sm);
  padding:10px 12px;
  font-size:14px;
  font-family:var(--font-body);
}
.player-row input::placeholder{color:var(--muted-dim);}
.icon-btn{
  background:none;border:1px solid var(--panel-border);color:var(--muted);
  width:36px;height:36px;border-radius:var(--radius-sm);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex:none;
  transition:border-color .16s ease,color .16s ease;
}
.icon-btn:hover{border-color:var(--rust);color:var(--rust);}
#add-player-btn{
  align-self:flex-start;background:none;border:1px dashed var(--panel-border);color:var(--muted);
  border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;cursor:pointer;margin-top:2px;
  transition:border-color .16s ease,color .16s ease;
}
#add-player-btn:hover{border-color:var(--gold);color:var(--gold);}

#start-btn{
  margin-top:8px;
  align-self:flex-start;
  background:var(--gold);
  color:var(--ink);
  border:none;
  font-family:var(--font-display);
  font-weight:600;
  font-size:18px;
  padding:15px 34px;
  border-radius:999px;
  cursor:pointer;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 24px rgba(227,167,58,0.22);
  transition:transform .16s ease, box-shadow .16s ease;
}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(227,167,58,0.3);}
#start-btn:active{transform:translateY(0);}
#start-btn .icon{width:18px;height:18px;}

/* ============================= GAME SCREEN ============================= */
#screen-game{background:var(--ocean);}
#map{width:100%;height:100%;display:block;touch-action:none;cursor:grab;}
#map.mode1-active .country{cursor:pointer;}
#map.dimmed{opacity:0.25;filter:blur(3px) saturate(0.6);pointer-events:none;transition:opacity .3s ease, filter .3s ease;}
#map:active{cursor:grabbing;}

.country{
  fill:var(--land);
  stroke:var(--land-stroke);
  stroke-width:0.6;
  vector-effect:non-scaling-stroke;
  transition:fill .22s ease;
}
#map.mode1-active .country:hover{fill:var(--land-hover);}
.country.target-country{fill:var(--gold);animation:pulseTarget 1.3s ease-in-out infinite;}
.country.is-correct{fill:var(--emerald) !important;animation:none;}
.country.is-wrong{fill:var(--rust) !important;animation:none;}
@keyframes pulseTarget{0%,100%{filter:drop-shadow(0 0 0 rgba(227,167,58,0));}50%{filter:drop-shadow(0 0 10px rgba(227,167,58,0.85));}}

#countries-g{transform-origin:0 0;will-change:transform;}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  z-index:20;
  pointer-events:none;
}
#hud > *{pointer-events:auto;}
.hud-brand{display:flex;align-items:center;gap:8px;color:var(--gold);}
.hud-brand .compass-icon{width:22px;height:22px;}
.hud-panel{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:999px;
  padding:8px 8px 8px 16px;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(8px);
}
#round-counter{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);white-space:nowrap;}
#round-counter b{color:var(--paper);}
.score-strip{display:flex;gap:6px;flex-wrap:wrap;}
.score-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--panel-soft);border-radius:999px;padding:5px 12px 5px 6px;
  font-size:13px;border:1px solid transparent;
  transition:border-color .2s ease, background .2s ease;
}
.score-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-dim);flex:none;}
.score-chip.active{border-color:var(--gold);background:var(--gold-soft);}
.score-chip.active .dot{background:var(--gold);}
.score-chip .pname{color:var(--paper);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-chip .pscore{font-family:var(--font-mono);color:var(--muted);}
.score-chip.active .pscore{color:var(--gold);font-weight:700;}
#hud-spacer{flex:1;}
.hud-btn{
  background:var(--panel);border:1px solid var(--panel-border);color:var(--muted);
  width:38px;height:38px;border-radius:50%;cursor:pointer;flex:none;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);
  transition:color .16s ease, border-color .16s ease;
}
.hud-btn:hover{color:var(--gold);border-color:rgba(227,167,58,0.4);}
.hud-btn .icon{width:17px;height:17px;}

/* Prompt banner */
#prompt-wrap{
  position:absolute;top:78px;left:50%;transform:translateX(-50%);
  z-index:15;display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;
}
#prompt-banner{
  background:var(--panel);border:1px solid var(--panel-border);
  border-radius:999px;padding:12px 26px;backdrop-filter:blur(8px);
  font-family:var(--font-display);font-size:clamp(16px,3vw,22px);
  text-align:center;pointer-events:auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}
#prompt-banner .label{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:2px;}
#prompt-banner .target-name{color:var(--gold);}
#skip-link{
  background:none;border:none;color:var(--muted);font-size:12.5px;text-decoration:underline;
  text-underline-offset:3px;cursor:pointer;pointer-events:auto;font-family:var(--font-body);
}
#skip-link:hover{color:var(--paper);}

/* Timer */
#timer-bar{
  position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.06);z-index:25;
}
#timer-fill{height:100%;width:100%;background:var(--gold);transform-origin:left;}

/* Mode 2 input */
#mode2-panel{
  position:absolute;left:50%;bottom:36px;transform:translateX(-50%);
  z-index:20;width:min(92vw,440px);
}
#autocomplete-wrap{position:relative;}
#guess-input{
  width:100%;background:var(--panel);border:1px solid var(--panel-border);
  color:var(--paper);border-radius:999px;padding:15px 22px;font-size:16px;
  backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,0.3);
  font-family:var(--font-body);
}
#guess-input:focus{border-color:var(--gold);}
#guess-input::placeholder{color:var(--muted-dim);}
#suggestions{
  position:absolute;bottom:calc(100% + 8px);left:0;right:0;
  background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);
  overflow:hidden;display:none;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,0.35);
}
#suggestions.open{display:block;}
#suggestions li{padding:11px 20px;font-size:14.5px;cursor:pointer;color:var(--paper);}
#suggestions li.active,#suggestions li:hover{background:var(--gold-soft);color:var(--gold);}

/* Mode 3 */
#mode3-overlay{
  position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:20px;
}
#mode3-card{
  background:var(--panel);border:1px solid var(--panel-border);border-radius:20px;
  padding:28px 30px 30px;max-width:480px;width:100%;backdrop-filter:blur(10px);
  box-shadow:0 20px 50px rgba(0,0,0,0.45);display:flex;flex-direction:column;align-items:center;gap:20px;
}
#mode3-card .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
#mode3-shape-svg{width:min(52vw,220px);height:min(52vw,220px);}
#mode3-shape-svg path{fill:var(--land);stroke:var(--gold);stroke-width:1.4;vector-effect:non-scaling-stroke;}
#mode3-shape-svg path.is-correct{fill:var(--emerald);}
#mode3-options{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;}
@media (max-width:420px){#mode3-options{grid-template-columns:1fr;}}
.option-btn{
  background:var(--panel-soft);border:1px solid var(--panel-border);color:var(--paper);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;cursor:pointer;text-align:left;
  transition:border-color .16s ease, background .16s ease;
  font-family:var(--font-body);
}
.option-btn:hover{border-color:rgba(227,167,58,0.45);}
.option-btn.is-correct{background:var(--emerald-soft);border-color:var(--emerald);color:var(--paper);}
.option-btn.is-wrong{background:var(--rust-soft);border-color:var(--rust);color:var(--paper);}
.option-btn:disabled{cursor:default;}

/* Toast + next */
#toast{
  position:absolute;top:150px;left:50%;transform:translateX(-50%) translateY(-14px);
  z-index:30;background:var(--panel);border:1px solid var(--panel-border);border-radius:999px;
  padding:11px 24px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .22s ease, transform .22s ease;
  backdrop-filter:blur(8px);white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.correct{border-color:var(--emerald);color:var(--emerald);}
#toast.wrong{border-color:var(--rust);color:var(--paper);}

#next-btn-wrap{
  position:absolute;left:50%;bottom:28px;transform:translateX(-50%) scale(0.9);
  z-index:22;opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;
}
#next-btn-wrap.show{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto;}
#next-btn{
  background:var(--gold);color:var(--ink);border:none;border-radius:999px;
  padding:13px 26px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  box-shadow:0 8px 20px rgba(227,167,58,0.3);display:flex;align-items:center;gap:8px;
}

.float-plus{
  position:fixed;z-index:40;font-family:var(--font-mono);font-weight:700;color:var(--emerald);
  font-size:20px;pointer-events:none;animation:floatUp 1s ease forwards;
}
@keyframes floatUp{0%{opacity:0;transform:translateY(0);}15%{opacity:1;}100%{opacity:0;transform:translateY(-38px);}}

/* ============================= END SCREEN ============================= */
#screen-end{
  background:radial-gradient(circle at 70% 10%, #142a40 0%, var(--ink) 55%, var(--ocean-deep) 100%);
  overflow-y:auto;
}
.end-inner{max-width:560px;margin:0 auto;padding:min(9vh,76px) 24px 60px;display:flex;flex-direction:column;gap:28px;align-items:center;text-align:center;}
.end-inner .compass-icon{width:46px;height:46px;color:var(--gold);}
.end-inner h1{font-size:clamp(28px,5vw,40px);}
.end-inner .subtitle{color:var(--muted);font-size:14.5px;}
#leaderboard{width:100%;display:flex;flex-direction:column;gap:9px;text-align:left;}
.lb-row{
  display:flex;align-items:center;gap:14px;background:var(--panel-soft);border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:14px 18px;
}
.lb-row.winner{border-color:var(--gold);background:linear-gradient(160deg, rgba(227,167,58,0.14), var(--panel-soft));}
.lb-rank{font-family:var(--font-mono);font-size:13px;color:var(--muted);width:26px;flex:none;}
.lb-medal{font-size:20px;width:26px;flex:none;text-align:center;}
.lb-name{flex:1;font-size:15.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-family:var(--font-mono);font-size:17px;color:var(--gold);font-weight:700;}
.end-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-primary{
  background:var(--gold);color:var(--ink);border:none;border-radius:999px;padding:14px 28px;
  font-family:var(--font-display);font-weight:600;font-size:16px;cursor:pointer;
  transition:transform .16s ease;
}
.btn-primary:hover{transform:translateY(-2px);}
.btn-secondary{
  background:none;color:var(--muted);border:1px solid var(--panel-border);border-radius:999px;
  padding:14px 28px;font-size:15px;cursor:pointer;font-family:var(--font-body);
  transition:color .16s ease, border-color .16s ease;
}
.btn-secondary:hover{color:var(--paper);border-color:var(--muted);}

@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>

<script>
"use strict";
/* ============================================================
   DATA
   ============================================================ */
const DATA_URL = "countries.json"; // swap this file to test different resolutions
const EXCLUDED = new Set(["Antarctica"]);
let FEATURES = [];
let QUIZ_NAMES = [];

const ALIASES = {
  "United States of America": ["usa","us","united states","america","u s a"],
  "United Kingdom": ["uk","britain","great britain","u k"],
  "Democratic Republic of the Congo": ["dr congo","drc","congo kinshasa"],
  "Republic of the Congo": ["congo","congo brazzaville"],
  "Republic of Serbia": ["serbia"],
  "United Republic of Tanzania": ["tanzania"],
  "Ivory Coast": ["cote d ivoire","cote divoire"],
  "The Bahamas": ["bahamas"],
  "East Timor": ["timor leste"],
  "Guinea Bissau": ["guinea-bissau","guineabissau"],
  "Macedonia": ["north macedonia"],
  "Swaziland": ["eswatini"],
  "Czech Republic": ["czechia"],
  "Myanmar": ["burma"],
  "South Korea": ["korea south","republic of korea"],
  "North Korea": ["korea north","dprk"],
  "United Arab Emirates": ["uae"],
  "Bosnia and Herzegovina": ["bosnia"],
  "Central African Republic": ["car"],
  "United States Virgin Islands": ["us virgin islands"]
};

function normalizeName(s){
  return (s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g," ")
    .trim()
    .replace(/^the\s+/,"")
    .replace(/\s+/g," ");
}

const NAME_LOOKUP = {}; // populated once countries.geojson loads, see loadWorldData()

function matchAnswer(raw, target){
  const key = normalizeName(raw);
  return !!key && NAME_LOOKUP[key] === target;
}

/* ============================================================
   GEO PROJECTION (equirectangular, no dependencies)
   ============================================================ */
function computeBounds(features){
  let lonMin=Infinity, lonMax=-Infinity, latMin=Infinity, latMax=-Infinity;
  function visitRing(ring){
    for (const pt of ring){
      const lon = pt[0], lat = pt[1];
      if (lon < lonMin) lonMin = lon;
      if (lon > lonMax) lonMax = lon;
      if (lat < latMin) latMin = lat;
      if (lat > latMax) latMax = lat;
    }
  }
  function visitGeom(geom){
    if (geom.type === "Polygon") geom.coordinates.forEach(visitRing);
    else if (geom.type === "MultiPolygon") geom.coordinates.forEach(poly => poly.forEach(visitRing));
  }
  features.forEach(f => visitGeom(f.geometry));
  return {lonMin, lonMax, latMin, latMax};
}
let WORLD_BOUNDS = null;

function makeProjection(bounds, width, height, padding){
  padding = padding || 0;
  const w = Math.max(1, width - padding*2), h = Math.max(1, height - padding*2);
  const lonSpan = bounds.lonMax - bounds.lonMin;
  const latSpan = bounds.latMax - bounds.latMin;
  const scale = Math.min(w / lonSpan, h / latSpan);
  const mapW = lonSpan * scale, mapH = latSpan * scale;
  const offsetX = padding + (w - mapW) / 2;
  const offsetY = padding + (h - mapH) / 2;
  return function project(pt){
    const x = (pt[0] - bounds.lonMin) * scale + offsetX;
    const y = (bounds.latMax - pt[1]) * scale + offsetY;
    return [x, y];
  };
}

function ringToPath(ring, project){
  let d = "";
  for (let i=0;i<ring.length;i++){
    const [x,y] = project(ring[i]);
    d += (i===0 ? "M" : "L") + x.toFixed(2) + "," + y.toFixed(2);
  }
  return d + "Z";
}
function geometryToPathD(geom, project){
  if (geom.type === "Polygon") return geom.coordinates.map(r => ringToPath(r, project)).join(" ");
  if (geom.type === "MultiPolygon") return geom.coordinates.map(poly => poly.map(r => ringToPath(r, project)).join(" ")).join(" ");
  return "";
}

/* ============================================================
   MAP MODULE
   ============================================================ */
const mapEl = document.getElementById("map");
const NS = "http://www.w3.org/2000/svg";
let countriesG, countryElByName = new Map(), featureByName = new Map();
let mapW = 0, mapH = 0;
let transform = {scale:1, x:0, y:0};
let currentProject = null;
const MIN_SCALE = 1, MAX_SCALE = 9;

function buildMap(){
  mapEl.innerHTML = "";
  const rect = mapEl.getBoundingClientRect();
  mapW = rect.width; mapH = rect.height;
  mapEl.setAttribute("viewBox", `0 0 ${mapW} ${mapH}`);
  const project = makeProjection(WORLD_BOUNDS, mapW, mapH, 24);
  currentProject = project;
  countriesG = document.createElementNS(NS, "g");
  countriesG.id = "countries-g";
  countryElByName.clear();
  featureByName.clear();
  FEATURES.forEach(f => {
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", geometryToPathD(f.geometry, project));
    path.setAttribute("fill-rule", "evenodd");
    path.setAttribute("class", "country");
    path.dataset.country = f.properties.name;
    countriesG.appendChild(path);
    countryElByName.set(f.properties.name, path);
    featureByName.set(f.properties.name, f);
  });
  mapEl.appendChild(countriesG);
  applyTransform();
}

function applyTransform(anim){
  countriesG.style.transition = anim ? "transform .35s ease" : "none";
  countriesG.style.transform = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
}
/* Content occupies local coords [0,mapW]x[0,mapH]. Clamp so any part of the
   content -- including corners/edges like the Falklands near the southern
   edge -- can be panned into view, with a little overscroll padding. */
function clampX(x, scale){
  if (scale <= 1) return 0;
  const pad = mapW * 0.1;
  return Math.min(pad, Math.max(mapW * (1 - scale) - pad, x));
}
function clampY(y, scale){
  if (scale <= 1) return 0;
  const pad = mapH * 0.1;
  return Math.min(pad, Math.max(mapH * (1 - scale) - pad, y));
}
function setTransform(t, anim){
  transform = {scale: Math.min(MAX_SCALE, Math.max(MIN_SCALE, t.scale)), x: clampX(t.x, t.scale), y: clampY(t.y, t.scale)};
  applyTransform(anim);
}
function resetView(anim){ setTransform({scale:1, x:0, y:0}, anim !== false); }

/* Gently zoom/pan toward a country so small nations (Palau, Vatican, Brunei...)
   are easy to spot. Bigger countries get little to no zoom; tiny ones are
   capped so it never feels jarring. */
function focusOnCountry(name, anim){
  const feature = featureByName.get(name);
  if (!feature || !currentProject) return;
  const bounds = computeBounds([feature]);
  const [x0, y0] = currentProject([bounds.lonMin, bounds.latMin]);
  const [x1, y1] = currentProject([bounds.lonMax, bounds.latMax]);
  const bw = Math.abs(x1 - x0), bh = Math.abs(y1 - y0);
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  const targetPx = 130;
  const rawScale = targetPx / Math.max(bw, bh, 10);
  const scale = Math.min(5.5, Math.max(1.6, rawScale));
  setTransform({scale, x: mapW/2 - cx*scale, y: mapH/2 - cy*scale}, anim !== false);
}

/* Pointer-based pan / pinch-zoom / click detection */
const pointers = new Map();
let dragState = null, pinchState = null;

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function midpoint(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }

function zoomAtScreenPoint(baseTransform, newScale, basePt, nowPt){
  const rect = mapEl.getBoundingClientRect();
  const bx = basePt.x-rect.left, by = basePt.y-rect.top;
  const gx = (bx-baseTransform.x)/baseTransform.scale;
  const gy = (by-baseTransform.y)/baseTransform.scale;
  const nx = nowPt.x-rect.left, ny = nowPt.y-rect.top;
  setTransform({scale:newScale, x: nx-gx*newScale, y: ny-gy*newScale});
}

mapEl.addEventListener("pointerdown", e => {
  mapEl.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (pointers.size === 1){
    dragState = {startTransform:{...transform}, startX:e.clientX, startY:e.clientY, moved:false, target:e.target};
  } else if (pointers.size === 2){
    const pts = [...pointers.values()];
    pinchState = {startDist: dist(pts[0],pts[1]), startMid: midpoint(pts[0],pts[1]), startScale: transform.scale, startTransform:{...transform}};
    dragState = null;
  }
});
mapEl.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (pointers.size === 2 && pinchState){
    const pts = [...pointers.values()];
    const newDist = dist(pts[0], pts[1]);
    const newMid = midpoint(pts[0], pts[1]);
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchState.startScale * (newDist/pinchState.startDist)));
    zoomAtScreenPoint(pinchState.startTransform, newScale, pinchState.startMid, newMid);
  } else if (pointers.size === 1 && dragState){
    const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
    if (Math.hypot(dx,dy) > 4) dragState.moved = true;
    setTransform({scale: dragState.startTransform.scale, x: dragState.startTransform.x+dx, y: dragState.startTransform.y+dy});
  }
});
function endPointer(e){
  const wasClick = pointers.size === 1 && dragState && !dragState.moved;
  const clickTarget = dragState ? dragState.target : null;
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinchState = null;
  if (pointers.size === 0){
    if (wasClick) handleMapClick(clickTarget);
    dragState = null;
  } else if (pointers.size === 1){
    const [rem] = pointers.values();
    dragState = {startTransform:{...transform}, startX:rem.x, startY:rem.y, moved:true, target:null};
  }
}
mapEl.addEventListener("pointerup", endPointer);
mapEl.addEventListener("pointercancel", endPointer);
mapEl.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = mapEl.getBoundingClientRect();
  const factor = e.deltaY < 0 ? 1.2 : 1/1.2;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, transform.scale*factor));
  zoomAtScreenPoint(transform, newScale, {x:e.clientX,y:e.clientY}, {x:e.clientX,y:e.clientY});
}, {passive:false});
mapEl.addEventListener("dblclick", e => {
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, transform.scale*1.9));
  zoomAtScreenPoint(transform, newScale, {x:e.clientX,y:e.clientY}, {x:e.clientX,y:e.clientY});
});

function handleMapClick(target){
  if (!target || !target.dataset || !target.dataset.country) return;
  if (game.mode === 1 && game.awaitingAnswer) evaluateMode1(target.dataset.country, target);
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.getElementById("screen-game").classList.contains("active")){
      buildMap();
      resetView(false);
      if (game.mode === 1 || game.mode === 2) reRenderMapState();
      if (game.mode === 2 && game.currentTarget) focusOnCountry(game.currentTarget, false);
    }
  }, 180);
});

function reRenderMapState(){
  if (!game.awaitingAnswer && game.currentTarget == null) return;
  countryElByName.forEach(el => el.classList.remove("target-country","is-correct","is-wrong"));
  if (game.mode === 2 && game.currentTarget){
    const el = countryElByName.get(game.currentTarget);
    if (el) el.classList.add("target-country");
  }
}

/* ============================================================
   MODE 3 — isolated shape rendering
   ============================================================ */
function renderShape(name){
  const feature = FEATURES.find(f => f.properties.name === name);
  const bounds = computeBounds([feature]);
  const project = makeProjection(bounds, 200, 200, 14);
  const d = geometryToPathD(feature.geometry, project);
  const pathEl = document.getElementById("mode3-shape-path");
  pathEl.setAttribute("d", d);
  pathEl.setAttribute("fill-rule", "evenodd");
  pathEl.classList.remove("is-correct");
}

/* ============================================================
   GAME ENGINE
   ============================================================ */
const game = {
  mode: 1,
  players: [],
  activePlayerIndex: 0,
  totalRounds: 10,
  currentRound: 0,
  queue: [],
  currentTarget: null,
  awaitingAnswer: false,
  timerEnabled: true,
  timerSeconds: 15,
  advanceTimeoutId: null,
  timerTimeoutId: null
};

function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pickOptions(correct, count){
  const pool = QUIZ_NAMES.filter(n => n !== correct);
  const wrong = shuffle(pool).slice(0, count-1);
  return shuffle([correct, ...wrong]);
}

function startGame(config){
  game.mode = config.mode;
  game.players = config.players.map(p => ({...p, score:0}));
  game.activePlayerIndex = 0;
  game.totalRounds = config.totalRounds;
  game.currentRound = 0;
  game.timerEnabled = config.timerEnabled;
  game.queue = shuffle(QUIZ_NAMES).slice(0, config.totalRounds);
  showScreen("game");
  buildMap();
  resetView(false);
  setupModeChrome();
  nextRound();
}

function setupModeChrome(){
  mapEl.classList.toggle("mode1-active", game.mode === 1);
  document.getElementById("mode2-panel").style.display = game.mode === 2 ? "block" : "none";
  document.getElementById("mode3-overlay").style.display = game.mode === 3 ? "flex" : "none";
  mapEl.classList.toggle("dimmed", game.mode === 3);
  document.getElementById("skip-link").style.display = game.mode === 3 ? "none" : "inline";
}

function nextRound(){
  clearTimeout(game.advanceTimeoutId);
  clearTimeout(game.timerTimeoutId);
  hideNextButton();
  clearFeedback();
  if (game.currentRound >= game.totalRounds){ endGame(); return; }
  game.currentTarget = game.queue[game.currentRound];
  game.currentRound++;
  game.awaitingAnswer = true;
  updateHUD();
  renderRound();
  if (game.timerEnabled) startTimer(); else document.getElementById("timer-fill").style.transition = "none";
}

function renderRound(){
  const banner = document.getElementById("prompt-banner");
  if (game.mode === 1){
    banner.innerHTML = `<span class="label">Find on the map</span><span class="target-name">${game.currentTarget}</span>`;
  } else if (game.mode === 2){
    banner.innerHTML = `<span class="label">Type the highlighted country</span>`;
    const el = countryElByName.get(game.currentTarget);
    if (el) el.classList.add("target-country");
    focusOnCountry(game.currentTarget, true);
    const input = document.getElementById("guess-input");
    input.value = "";
    renderSuggestions([]);
    setTimeout(() => input.focus(), 50);
  } else if (game.mode === 3){
    banner.innerHTML = "";
    renderShape(game.currentTarget);
    const options = pickOptions(game.currentTarget, 5);
    const wrap = document.getElementById("mode3-options");
    wrap.innerHTML = "";
    options.forEach(name => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = name;
      btn.dataset.name = name;
      btn.addEventListener("click", () => evaluateMode3(name, btn));
      wrap.appendChild(btn);
    });
  }
}

function startTimer(){
  const fill = document.getElementById("timer-fill");
  fill.style.transition = "none";
  fill.style.width = "100%";
  void fill.offsetWidth;
  requestAnimationFrame(() => {
    fill.style.transition = `width ${game.timerSeconds}s linear`;
    fill.style.width = "0%";
  });
  game.timerTimeoutId = setTimeout(() => { if (game.awaitingAnswer) registerAnswer(false); }, game.timerSeconds*1000);
}

function evaluateMode1(name, el){
  if (!game.awaitingAnswer) return;
  const correct = name === game.currentTarget;
  el.classList.add(correct ? "is-correct" : "is-wrong");
  if (!correct){
    const correctEl = countryElByName.get(game.currentTarget);
    if (correctEl) correctEl.classList.add("is-correct");
  }
  registerAnswer(correct, el);
}
function evaluateMode3(name, btn){
  if (!game.awaitingAnswer) return;
  const correct = name === game.currentTarget;
  btn.classList.add(correct ? "is-correct" : "is-wrong");
  document.querySelectorAll("#mode3-options .option-btn").forEach(b => b.disabled = true);
  if (!correct){
    document.querySelectorAll("#mode3-options .option-btn").forEach(b => { if (b.dataset.name === game.currentTarget) b.classList.add("is-correct"); });
  }
  document.getElementById("mode3-shape-path").classList.add("is-correct");
  registerAnswer(correct, btn);
}
function submitMode2(raw){
  if (!game.awaitingAnswer) return;
  const correct = matchAnswer(raw, game.currentTarget);
  const el = countryElByName.get(game.currentTarget);
  if (el){ el.classList.remove("target-country"); el.classList.add(correct ? "is-correct" : "is-wrong"); }
  renderSuggestions([]);
  registerAnswer(correct);
}

function registerAnswer(correct, anchorEl){
  if (!game.awaitingAnswer) return;
  game.awaitingAnswer = false;
  clearTimeout(game.timerTimeoutId);
  const player = game.players[game.activePlayerIndex];
  if (correct){
    player.score += 1;
    if (anchorEl) floatPlus(anchorEl);
  }
  updateHUD();
  showFeedback(correct);
  showNextButton();
  game.advanceTimeoutId = setTimeout(advance, 1500);
}

function advance(){
  clearTimeout(game.advanceTimeoutId);
  game.activePlayerIndex = (game.activePlayerIndex + 1) % game.players.length;
  nextRound();
}

function skipRound(){
  if (!game.awaitingAnswer) return;
  if (game.mode === 1){
    const el = countryElByName.get(game.currentTarget);
    if (el) el.classList.add("is-correct");
  } else if (game.mode === 2){
    const el = countryElByName.get(game.currentTarget);
    if (el){ el.classList.remove("target-country"); el.classList.add("is-wrong"); }
  }
  registerAnswer(false);
}

function clearFeedback(){
  countryElByName.forEach(el => el.classList.remove("target-country","is-correct","is-wrong"));
  document.getElementById("toast").classList.remove("show","correct","wrong");
}

function showFeedback(correct){
  const toast = document.getElementById("toast");
  toast.textContent = correct ? "Correct! +1" : `That's ${game.currentTarget}`;
  toast.className = "show " + (correct ? "correct" : "wrong");
}
function showNextButton(){ document.getElementById("next-btn-wrap").classList.add("show"); }
function hideNextButton(){ document.getElementById("next-btn-wrap").classList.remove("show"); }

function floatPlus(anchorEl){
  let x, y;
  if (anchorEl.getBoundingClientRect){
    const r = anchorEl.getBoundingClientRect();
    x = r.left + r.width/2; y = r.top + r.height/2;
  } else { x = window.innerWidth/2; y = window.innerHeight/2; }
  const el = document.createElement("div");
  el.className = "float-plus";
  el.textContent = "+1";
  el.style.left = x + "px";
  el.style.top = y + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function updateHUD(){
  document.getElementById("round-counter").innerHTML = `Round <b>${Math.min(game.currentRound, game.totalRounds)}</b> / ${game.totalRounds}`;
  const strip = document.getElementById("score-strip");
  strip.innerHTML = "";
  game.players.forEach((p, i) => {
    const chip = document.createElement("div");
    chip.className = "score-chip" + (i === game.activePlayerIndex ? " active" : "");
    chip.innerHTML = `<span class="dot"></span><span class="pname">${p.name}</span><span class="pscore">${p.score}</span>`;
    strip.appendChild(chip);
  });
}

function endGame(){
  showScreen("end");
  const sorted = [...game.players].sort((a,b) => b.score - a.score);
  const multiplayer = game.players.length > 1;
  document.getElementById("end-subtitle").textContent = multiplayer
    ? `${sorted[0].name} leads with ${sorted[0].score} of ${game.totalRounds} correct.`
    : `You scored ${sorted[0].score} of ${game.totalRounds}.`;
  const medals = ["🥇","🥈","🥉"];
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";
  sorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "lb-row" + (i === 0 && multiplayer ? " winner" : "");
    row.innerHTML = `<span class="lb-rank">#${i+1}</span><span class="lb-medal">${medals[i] || ""}</span><span class="lb-name">${p.name}</span><span class="lb-score">${p.score}</span>`;
    board.appendChild(row);
  });
}

/* ============================================================
   AUTOCOMPLETE (mode 2)
   ============================================================ */
const guessInput = document.getElementById("guess-input");
const suggestionsEl = document.getElementById("suggestions");
let activeSuggestion = -1;

function renderSuggestions(list){
  suggestionsEl.innerHTML = "";
  activeSuggestion = -1;
  list.forEach(name => {
    const li = document.createElement("li");
    li.textContent = name;
    li.dataset.name = name;
    li.setAttribute("role","option");
    li.addEventListener("pointerdown", e => { e.preventDefault(); selectSuggestion(name); });
    suggestionsEl.appendChild(li);
  });
  suggestionsEl.classList.toggle("open", list.length > 0);
  guessInput.setAttribute("aria-expanded", list.length > 0 ? "true" : "false");
}
function selectSuggestion(name){
  guessInput.value = name;
  submitMode2(name);
}
function updateActiveSuggestion(){
  [...suggestionsEl.children].forEach((li,i) => li.classList.toggle("active", i === activeSuggestion));
  const el = suggestionsEl.children[activeSuggestion];
  if (el) el.scrollIntoView({block:"nearest"});
}
guessInput.addEventListener("input", () => {
  const norm = normalizeName(guessInput.value);
  if (!norm){ renderSuggestions([]); return; }
  const matches = QUIZ_NAMES.filter(n => normalizeName(n).startsWith(norm)).slice(0,6);
  renderSuggestions(matches);
});
guessInput.addEventListener("keydown", e => {
  const items = [...suggestionsEl.children];
  if (e.key === "ArrowDown"){ e.preventDefault(); activeSuggestion = Math.min(activeSuggestion+1, items.length-1); updateActiveSuggestion(); }
  else if (e.key === "ArrowUp"){ e.preventDefault(); activeSuggestion = Math.max(activeSuggestion-1, -1); updateActiveSuggestion(); }
  else if (e.key === "Enter"){
    e.preventDefault();
    if (activeSuggestion >= 0 && items[activeSuggestion]) selectSuggestion(items[activeSuggestion].dataset.name);
    else submitMode2(guessInput.value);
  } else if (e.key === "Escape"){ renderSuggestions([]); }
});

/* ============================================================
   SETUP SCREEN
   ============================================================ */
let selectedMode = 1;
let playersMode = "solo";
let playerNames = ["Player 1", "Player 2"];
let selectedRounds = 10;
let timerOn = true;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
}

document.querySelectorAll(".mode-card").forEach(card => {
  card.addEventListener("click", () => {
    document.querySelectorAll(".mode-card").forEach(c => c.classList.remove("selected"));
    card.classList.add("selected");
    selectedMode = parseInt(card.dataset.mode, 10);
  });
});
document.querySelector('.mode-card[data-mode="1"]').classList.add("selected");

document.querySelectorAll("#player-mode-chips .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll("#player-mode-chips .chip").forEach(c => c.classList.remove("selected"));
    chip.classList.add("selected");
    playersMode = chip.dataset.players;
    renderPlayersPanel();
  });
});
document.querySelectorAll("#rounds-chips .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll("#rounds-chips .chip").forEach(c => c.classList.remove("selected"));
    chip.classList.add("selected");
    selectedRounds = chip.dataset.rounds === "all" ? QUIZ_NAMES.length : parseInt(chip.dataset.rounds, 10);
  });
});
document.querySelectorAll("#timer-chips .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll("#timer-chips .chip").forEach(c => c.classList.remove("selected"));
    chip.classList.add("selected");
    timerOn = chip.dataset.timer === "on";
  });
});

function renderPlayersPanel(){
  const panel = document.getElementById("players-panel");
  const addBtn = document.getElementById("add-player-btn");
  panel.innerHTML = "";
  if (playersMode === "solo"){
    addBtn.style.display = "none";
    return;
  }
  addBtn.style.display = playerNames.length >= 6 ? "none" : "inline-flex";
  playerNames.forEach((name, i) => {
    const row = document.createElement("div");
    row.className = "player-row";
    const input = document.createElement("input");
    input.type = "text";
    input.value = name;
    input.placeholder = `Player ${i+1}`;
    input.maxLength = 18;
    input.addEventListener("input", () => { playerNames[i] = input.value; });
    row.appendChild(input);
    if (playerNames.length > 2){
      const rm = document.createElement("button");
      rm.className = "icon-btn";
      rm.type = "button";
      rm.innerHTML = '<svg class="icon" style="width:14px;height:14px"><use href="#icon-close"/></svg>';
      rm.addEventListener("click", () => { playerNames.splice(i,1); renderPlayersPanel(); });
      row.appendChild(rm);
    }
    panel.appendChild(row);
  });
}
document.getElementById("add-player-btn").addEventListener("click", () => {
  if (playerNames.length >= 6) return;
  playerNames.push(`Player ${playerNames.length+1}`);
  renderPlayersPanel();
});
renderPlayersPanel();

document.getElementById("start-btn").addEventListener("click", () => {
  let players;
  if (playersMode === "solo"){
    players = [{id:0, name:"You"}];
  } else {
    players = playerNames.map((n,i) => ({id:i, name: (n && n.trim()) ? n.trim() : `Player ${i+1}`}));
  }
  startGame({mode: selectedMode, players, totalRounds: selectedRounds, timerEnabled: timerOn});
});

document.getElementById("next-btn").addEventListener("click", advance);
document.getElementById("skip-link").addEventListener("click", skipRound);
document.getElementById("quit-btn").addEventListener("click", () => {
  clearTimeout(game.advanceTimeoutId);
  clearTimeout(game.timerTimeoutId);
  showScreen("start");
});
document.getElementById("reset-view-btn").addEventListener("click", () => resetView(true));
document.getElementById("play-again-btn").addEventListener("click", () => {
  startGame({mode: game.mode, players: game.players.map(p => ({id:p.id, name:p.name})), totalRounds: game.totalRounds, timerEnabled: game.timerEnabled});
});
document.getElementById("new-game-btn").addEventListener("click", () => showScreen("start"));

/* ============================================================
   START-SCREEN WATERMARK
   ============================================================ */
function drawWatermark(){
  const svg = document.getElementById("start-watermark");
  const project = makeProjection(WORLD_BOUNDS, 1000, 500, 10);
  FEATURES.forEach(f => {
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", geometryToPathD(f.geometry, project));
    path.setAttribute("fill-rule", "evenodd");
    svg.appendChild(path);
  });
}

/* ============================================================
   LOAD WORLD DATA (static file fetch, so you can swap resolutions
   just by replacing countries.geojson without touching this HTML)
   ============================================================ */
async function loadWorldData(){
  const startBtn = document.getElementById("start-btn");
  const originalLabel = startBtn.innerHTML;
  startBtn.disabled = true;
  startBtn.textContent = "Loading world data\u2026";
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error("HTTP " + res.status + " loading " + DATA_URL);
    const raw = await res.json();
    FEATURES = raw.features.filter(f => !EXCLUDED.has(f.properties.name));
    QUIZ_NAMES = FEATURES.map(f => f.properties.name);
    QUIZ_NAMES.forEach(n => { NAME_LOOKUP[normalizeName(n)] = n; });
    Object.entries(ALIASES).forEach(([canon, aliases]) => {
      aliases.forEach(a => { NAME_LOOKUP[normalizeName(a)] = canon; });
    });
    WORLD_BOUNDS = computeBounds(FEATURES);
    document.querySelector('#rounds-chips .chip[data-rounds="all"]').textContent = `All (${QUIZ_NAMES.length})`;
    drawWatermark();
    startBtn.disabled = false;
    startBtn.innerHTML = originalLabel;
  } catch (err) {
    console.error("Failed to load " + DATA_URL + ":", err);
    startBtn.textContent = "Couldn't load map data \u2014 see console";
  }
}
loadWorldData();
